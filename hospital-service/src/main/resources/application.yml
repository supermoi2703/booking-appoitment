server:
  port: 9002
  servlet:
    context-path: /hospital

spring:
  application:
    name: HOSPITAL-SERVICE
  datasource:
    url: jdbc:postgresql://localhost:5432/hospital
    username: postgres
    password: 1234
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          lob:
            non_contextual_creation: true

eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    hostname:localhost